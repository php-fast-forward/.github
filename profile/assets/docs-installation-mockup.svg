<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="980" viewBox="0 0 1600 980" fill="none" role="img" aria-labelledby="title desc">
  <title id="title">PHP Fast Forward installation documentation mockup</title>
  <desc id="desc">A documentation mockup showing installation and bootstrap snippets for the Fast Forward framework.</desc>
  <defs>
    <linearGradient id="pageGlow" x1="1120" y1="150" x2="1540" y2="860" gradientUnits="userSpaceOnUse">
      <stop stop-color="#21D4FD" stop-opacity="0.55"/>
      <stop offset="0.45" stop-color="#3A5BFF" stop-opacity="0.30"/>
      <stop offset="1" stop-color="#7A36FF" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="chevronGradient" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#7A36FF"/>
      <stop offset="0.55" stop-color="#2D6CFF"/>
      <stop offset="1" stop-color="#24D6F6"/>
    </linearGradient>
    <filter id="blur" x="1040" y="40" width="480" height="820" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feFlood flood-opacity="0" result="BackgroundImageFix"/>
      <feBlend in="SourceGraphic" in2="BackgroundImageFix" result="shape"/>
      <feGaussianBlur stdDeviation="54" result="effect1_foregroundBlur"/>
    </filter>
  </defs>

  <rect width="1600" height="980" fill="#07112F"/>
